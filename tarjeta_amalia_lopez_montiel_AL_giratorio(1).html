<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarjeta de presentación - Amalia López Montiel</title>
  <style>
    :root {
      --green: #0b6b3a;
      --green-dark: #064525;
      --gold: #d6a63a;
      --bg: #f4f7f5;
      --text: #1f2933;
      --muted: #667085;
      --card: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eef7f0, #ffffff);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.12);
      overflow: hidden;
      border: 1px solid rgba(11,107,58,0.12);
    }

    .header {
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: white;
      padding: 34px 28px 28px;
      text-align: center;
      position: relative;
    }

    .badge {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      margin: 0 auto 16px;
      background: white;
      color: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 700;
      border: 4px solid rgba(214,166,58,0.9);
      letter-spacing: 1px;
      animation: girar 6s linear infinite;
    }

    @keyframes girar {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    .badge span {
      display: inline-block;
      animation: mantenerTexto 6s linear infinite reverse;
    }

    @keyframes mantenerTexto {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 15px;
      opacity: 0.92;
    }

    .content {
      padding: 26px 24px 28px;
    }

    .info {
      display: grid;
      gap: 14px;
      margin-bottom: 22px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--bg);
      border-radius: 16px;
      border: 1px solid rgba(11,107,58,0.08);
    }

    .icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: rgba(11,107,58,0.12);
      color: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      flex-shrink: 0;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .value {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
    }

    .actions {
      display: grid;
      gap: 12px;
    }

    .btn {
      display: block;
      text-align: center;
      text-decoration: none;
      padding: 15px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .primary {
      background: #25D366;
      color: white;
      box-shadow: 0 8px 18px rgba(37,211,102,0.28);
    }

    .secondary {
      background: var(--green);
      color: white;
    }

    .outline {
      border: 2px solid var(--green);
      color: var(--green);
      background: white;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="header">
      <div class="badge"><span>AL</span></div>
      <h1>Amalia López Montiel</h1>
      <div class="subtitle">Tarjeta de presentación digital</div>
    </section>

    <section class="content">
      <div class="info">
        <div class="row">
          <div class="icon">📱</div>
          <div>
            <div class="label">Teléfono</div>
            <div class="value">+502 5632-3772</div>
          </div>
        </div>

        <div class="row">
          <div class="icon">✉️</div>
          <div>
            <div class="label">Correo electrónico</div>
            <div class="value">alopez@oirsa.org</div>
          </div>
        </div>
      </div>

      <div class="actions">
        <a class="btn primary" href="https://wa.me/50256323772?text=Hola%2C%20Licenciada%20Amalia.%20Gracias%20por%20compartir%20su%20contacto." target="_blank" rel="noopener">
          Escribir por WhatsApp
        </a>

        <a class="btn secondary" href="mailto:alopez@oirsa.org">
          Enviar correo
        </a>

        <a class="btn outline" href="data:text/vcard;charset=utf-8,BEGIN:VCARD%0AVERSION:3.0%0AN:López%20Montiel;Amalia;;;%0AFN:Amalia%20López%20Montiel%0ATEL;TYPE=CELL:+50256323772%0AEMAIL:alopez@oirsa.org%0AORG:OIRSA%0AEND:VCARD%0A" download="Amalia_Lopez_Montiel.vcf">
          Guardar contacto
        </a>
      </div>

      <div class="footer">
        OIRSA
      </div>
    </section>
  </main>
</body>
</html>
